<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="flex_rule">
    
    <main class="main_wrapper flex_rule">
        <header>
        <h1>Sign up</h1>
    </header>
        <form class="login_form flex_rule">
           <input type="text" placeholder="Full Name" id="reg_name">
           <input type="email" placeholder="Email" id="reg_email">
           <input type="text" placeholder="Company" id="reg_company">
           <input type="password" placeholder="Password" id="reg_pass">
           <input type="password" placeholder="Confirm Password" id="reg_pass_conf">
           <button type="submit" id="reg_butt">Create Account</button>
           <div class="login_action">
            <span>Already have an account?</span>
            <a href="index.html">Log in</a>
           </div>
           
           
        </form>
    </main>
</body>
</html>
