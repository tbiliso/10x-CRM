<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn Page</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="flex_rule">
    
    <main class="main_wrapper flex_rule">
        <header>
        <h1>10x CRM</h1>
    </header>
        <form class="login_form flex_rule">
            <input type="email" placeholder="Enter your mail" id="log_mail">
            <input type="password" placeholder="Enter password" id="log_pass">
        
        <button type="submit" id="log_butt">Log In</button>
        </form>
        <div class="login_action">
            <a href="#">Forgot password?</a>
            <a href="signup.html">Sign up</a>
        </div>
    </main>
    <script src="./js/auth.js"></script>
</body>
</html>
